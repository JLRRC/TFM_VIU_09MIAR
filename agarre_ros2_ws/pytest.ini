; Ruta/archivo: agarre_ros2_ws/pytest.ini
; Contenido: Configuracion de pytest para el workspace ROS 2.
; Uso breve: pytest la usa automaticamente al ejecutar los tests.
[pytest]
markers =
    linter: ament linter tests
    flake8: flake8 compatibility tests
    pep257: pydocstyle compatibility tests
    copyright: copyright header checks
